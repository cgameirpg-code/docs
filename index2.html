<!DOCTYPE html> <html lang="th"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>จดหมายถึงอร 💌</title> <style> body{ margin:0; font-family:Arial,sans-serif; background:linear-gradient(135deg,#ffd6e8,#ffeef6,#fff8fc); display:flex; justify-content:center; align-items:center; height:100vh; } .envelope{ text-align:center; cursor:pointer; animation:float 2s ease-in-out infinite; } .envelope .mail{ font-size:120px; } .envelope p{ font-size:24px; color:#ff5c9f; } .card{ width:90%; max-width:500px; background:white; border-radius:30px; padding:30px; text-align:center; box-shadow:0 10px 30px rgba(255,105,180,.25); } h1{ color:#ff5c9f; } .choice{ margin-top:20px; text-align:left; font-size:24px; } label{ display:block; margin:15px 0; } #result{ margin-top:20px; font-size:30px; font-weight:bold; } @keyframes float{ 0%{transform:translateY(0);} 50%{transform:translateY(-15px);} 100%{transform:translateY(0);} } </style> </head> <body> <div id="letterPage"> <div class="envelope" onclick="openLetter()"> <div class="mail">💌</div> <p>กดเปิดจดหมายจากม่อน</p> </div> </div> <div id="mainPage" style="display:none;"> <div class="card"> <h1>🥺 ขอโทษนะ 🩷</h1> <p> ขอโทษที่พูดจาไม่ดี แล้วพาทะเลาะตลอดเลย<br><br> ม่อนขอโทษครับ 🥺<br> ม่อนมาง้ออรครับ 💖 </p> <div class="choice"> <label> <input type="radio" name="answer" onclick="happy()"> ง้อ 💕 </label> <label> <input type="radio" name="answer" onclick="sad()"> ชิชิงอน 😤 </label> </div> <div id="result"></div> </div> </div> <script> function openLetter(){ document.getElementById("letterPage").style.display="none"; document.getElementById("mainPage").style.display="block"; } function happy(){ document.getElementById("result").innerHTML = "🎉💖 เย้~ อรอ้วนหายงอนแล้ววว 🥰"; } function sad(){ document.getElementById("result").innerHTML = "🥺💔 ฮืออ ม่อนจะง้อต่อนะครับ 🌹"; } </script> </body> </html>
